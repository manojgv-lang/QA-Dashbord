<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>QA Dashboard</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #eaf1ff 0%, #f8fbff 45%, #eef7ff 100%);
      padding: 24px;
      color: #0f172a;
    }

    .card {
      background: rgba(255,255,255,0.92);
      border: 1px solid #e5edf8;
      border-radius: 22px;
      padding: 28px;
      margin-bottom: 24px;
      box-shadow: 0 12px 32px rgba(15,23,42,0.08);
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 22px;
    }

    .logo {
      width: 76px;
      height: 76px;
      border-radius: 22px;
      box-shadow: 0 12px 28px rgba(37,99,235,0.28);
      object-fit: cover;
    }

    .page-title {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #0b1220;
      margin: 0;
    }

    .page-subtitle {
      margin-top: 6px;
      color: #64748b;
      font-size: 15px;
      font-weight: 600;
    }

    h1, h2, h3 { color: #0f172a; }
    h2 { font-size: 25px; margin: 0 0 20px 0; }

    label {
      display: block;
      font-weight: 700;
      color: #334155;
      margin-bottom: 8px;
    }

    select, input, textarea {
      padding: 14px 16px;
      width: 100%;
      margin-bottom: 16px;
      border: 1px solid #cbd5e1;
      border-radius: 14px;
      background: #ffffff;
      font-size: 14px;
      outline: none;
      transition: all 0.2s ease;
    }

    select:focus, input:focus, textarea:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37,99,235,0.12);
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    button {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #fff;
      border: none;
      padding: 13px 20px;
      border-radius: 13px;
      cursor: pointer;
      font-weight: 800;
      margin-right: 8px;
      margin-top: 8px;
      transition: all 0.2s ease;
      box-shadow: 0 8px 18px rgba(37,99,235,0.18);
    }

    button:hover { transform: translateY(-1px); box-shadow: 0 12px 24px rgba(37,99,235,0.25); }
    button:disabled { background: #9ca3af; cursor: not-allowed; box-shadow: none; transform: none; }

    .green-btn { background: linear-gradient(135deg, #16a34a, #15803d); box-shadow: 0 8px 18px rgba(22,163,74,0.18); }
    .green-btn:hover { box-shadow: 0 12px 24px rgba(22,163,74,0.25); }
    .danger { background: linear-gradient(135deg, #dc2626, #b91c1c); box-shadow: 0 8px 18px rgba(220,38,38,0.18); }
    .danger:hover { box-shadow: 0 12px 24px rgba(220,38,38,0.25); }

    .loading {
      color: #2563eb;
      font-weight: 800;
      margin-top: 12px;
      white-space: pre-line;
    }

    .user-info {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .info-pill {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 14px;
    }

    .role-pill {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .4px;
    }

    .role-admin { background: #dbeafe; color: #1d4ed8; }
    .role-agent { background: #dcfce7; color: #15803d; }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      margin-top: 20px;
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 22px rgba(15,23,42,0.06);
    }

    th, td {
      border-bottom: 1px solid #edf2f7;
      padding: 13px;
      font-size: 13px;
      vertical-align: top;
    }

    th {
      background: #eff6ff;
      color: #1e3a8a;
      font-weight: 900;
    }

    tr:last-child td { border-bottom: none; }
    .good { background: #f0fdf4; }
    .bad { background: #fef2f2; }
    .pending { background: #fff8e1; }

    .summary-box {
      background: linear-gradient(135deg, #eff6ff, #f8fafc);
      border-left: 6px solid #2563eb;
      border-radius: 18px;
      padding: 22px;
      margin-top: 22px;
      line-height: 1.7;
      font-size: 15px;
    }

    .category-title {
      margin-top: 24px;
      background: linear-gradient(135deg, #e0e7ff, #eef2ff);
      padding: 13px 16px;
      border-radius: 14px;
      font-weight: 900;
      color: #3730a3;
    }

    .all-agent-table { width: 100%; border-collapse: separate; border-spacing: 0 10px; margin-top: 18px; background: transparent; box-shadow: none; }
    .all-agent-table th { background: #e8eefc; color: #111827; font-size: 14px; padding: 14px; text-align: center; border: none; }
    .all-agent-table td { background: #ffffff; border-top: 1px solid #dbe3f0; border-bottom: 1px solid #dbe3f0; padding: 15px; font-size: 14px; vertical-align: middle; }
    .agent-name-cell { font-weight: 900; width: 22%; }
    .number-cell { text-align: center; font-weight: 900; width: 12%; }
    .score-good { color: #15803d; font-weight: 900; text-align: center; }
    .score-bad { color: #dc2626; font-weight: 900; text-align: center; }
    .details-cell { text-align: center; }
    .details-btn { background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white; padding: 9px 14px; border-radius: 10px; font-size: 13px; margin: 0; }
    .category-detail-row td { background: #f8fafc !important; border: 1px solid #dbe3f0 !important; border-radius: 12px !important; padding: 16px !important; }
    .category-detail-box { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; background: #f8fafc; }
    .category-item { background: white; border: 1px solid #dbe3f0; border-radius: 12px; padding: 12px; display: flex; justify-content: space-between; gap: 10px; font-size: 13px; }
    .mini-table { max-width: 700px; }
    .chart-count { font-weight: 900; text-align: center; }

    #disputePopup { display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.55); align-items: center; justify-content: center; z-index: 9999; }
    .popup { background: white; width: 420px; max-width: 95%; padding: 26px; border-radius: 22px; box-shadow: 0 24px 60px rgba(15,23,42,0.25); }

    a { color: #2563eb; font-weight: 800; text-decoration: none; }
    a:hover { text-decoration: underline; }

    .fixed-badge {
      position: fixed;
      right: 18px;
      bottom: 18px;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 999px;
      padding: 10px 16px;
      box-shadow: 0 10px 25px rgba(15,23,42,0.12);
      font-size: 13px;
      font-weight: 800;
      color: #475569;
      z-index: 99;
    }

    @media(max-width: 900px) {
      body { padding: 14px; }
      .grid-2 { grid-template-columns: 1fr; }
      .topbar { align-items: flex-start; }
      .page-title { font-size: 28px; }
      .logo { width: 62px; height: 62px; }
      .category-detail-box { grid-template-columns: 1fr; }
    }
  </style>
</head>

  <h2>Agent Report Filters</h2>

function setLoading(id, text) {
  document.getElementById(id).textContent = text || "";

async function apiCall(payload) {
  const response = await fetch(SCRIPT_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(payload)
  });

  const text = await response.text();

  try {
    return JSON.parse(text);
  } catch (err) {
    console.log("API returned:", text);
    return { ok:false, error:"Apps Script returned invalid response." };
  }
}

async function login() {
  const provider = new firebase.auth.GoogleAuthProvider();
  const btn = document.getElementById("loginBtn");

  try {
    btn.disabled = true;
    setLoading("mainStatus", "Logging in...");

    const result = await auth.signInWithPopup(provider);

async function validateUser(email) {
  const data = await apiCall({ action:"login", email:email });

  if (!data.ok) {
    alert(data.error);
    return;
  }

  CURRENT_ROLE = data.role;

function renderCalls(calls) {

  });

  let html = `

    <h2>Call Breakdown</h2>

  `;

  Object.keys(grouped).sort().forEach(category => {
    html += `

      <table>
        <thead>

            <th>Date</th>

          <td>${call.callDate || ""}</td>
          <td>${call.queryType || ""}</td>
          <td>${call.finalScore || ""}</td>
          <td>${call.score || ""}%</td>

          <td>${recording}</td>
          <td>${call.feedback || ""}</td>
        </tr>

    });

    html += `</tbody></table>`;
  });

  html += `
    <div class="summary-box">
      ${buildFeedbackSummary(feedbackTexts, good, bad, calls.length)}
    </div>
    <div style="text-align:right; margin-top:20px;">
      <button class="danger" onclick="openDispute()">Raise Dispute</button>
    </div>
  `;

}

function buildCategorySummary(grouped) {
  const categories = Object.keys(grouped).sort();

  let html = `
    <table class="mini-table">
      <thead>
        <tr>
          <th>Category</th>
          <th>Call Count</th>
        </tr>
      </thead>
      <tbody>
  `;

  categories.forEach(cat => {
    html += `
      <tr>
        <td>${cat}</td>
        <td class="chart-count">${grouped[cat].length}</td>
      </tr>
    `;
  });

  html += `</tbody></table>`;
  return html;
}

function cleanPoint(text) {
  if (!text) return "";

  return text
    .replace(/\n/g, " ")
    .replace(/\s+/g, " ")
    .replace(/^[-–•:,\s]+/, "")
    .replace(/na$/i, "")
    .replace(/^and\s+/i, "")
    .trim();
}

function normalizePoint(text) {
  return cleanPoint(text)
    .toLowerCase()
    .replace(/[^\w\s]/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

function isBadSummaryHeader(point) {
  const p = normalizePoint(point);

  const blocked = [
    "uninformed pointers and red flagged issues",
    "uninformed pointers",
    "red flagged issues",
    "missed pitch points",
    "missed pitch points uninformed pointers and red flagged issues",
    "missed pitch points uninformed pointers red flagged issues"
  ];

  return blocked.some(b => p === b || p.includes(b));
}

function addUnique(list, point) {
  const cleaned = cleanPoint(point);

  if (!cleaned || cleaned.length < 8) return;
  if (isBadSummaryHeader(cleaned)) return;

  const normalized = normalizePoint(cleaned);

  const exists = list.some(item => {
    const existing = normalizePoint(item);
    return existing === normalized || existing.includes(normalized) || normalized.includes(existing);
  });

  if (!exists) list.push(cleaned);
}

function splitFeedbackSections(feedback) {
  const text = feedback || "";
  const lower = text.toLowerCase();

  let goodPractice = "";
  let improvement = "";

  const goodIndex = lower.indexOf("good practice");
  const missedFullIndex = lower.indexOf("missed pitch points, uninformed pointers, and red-flagged issues");
  const missedShortIndex = lower.indexOf("missed pitch points");
  const missedIndex = missedFullIndex !== -1 ? missedFullIndex : missedShortIndex;

  if (goodIndex !== -1) {
    const start = goodIndex + "good practice".length;
    const end = missedIndex !== -1 && missedIndex > goodIndex ? missedIndex : text.length;
    goodPractice = text.substring(start, end);
  }

  if (missedIndex !== -1) {
    if (missedFullIndex !== -1) {
      const header = "missed pitch points, uninformed pointers, and red-flagged issues";
      improvement = text.substring(missedFullIndex + header.length);
    } else {
      const header = "missed pitch points";
      improvement = text.substring(missedShortIndex + header.length);
    }
  }

  return { goodPractice, improvement };
}

function extractPoints(sectionText) {
  if (!sectionText) return [];

  return sectionText
    .split(/[-•\n]+/)
    .map(p => cleanPoint(p))
    .filter(p => p && p.length > 8 && p.toLowerCase() !== "na")
    .filter(p => !isBadSummaryHeader(p));
}

function buildFeedbackSummary(feedbackTexts, good, bad, totalCalls) {
  let strengths = [];
  let improvementAreas = [];

  feedbackTexts.forEach(feedback => {
    const sections = splitFeedbackSections(feedback);
    extractPoints(sections.goodPractice).forEach(point => addUnique(strengths, point));
    extractPoints(sections.improvement).forEach(point => addUnique(improvementAreas, point));
  });

  if (!strengths.length) {
    strengths.push("The agent handled the audited calls with acceptable overall customer support.");
  }

  if (!improvementAreas.length) {
    improvementAreas.push("No major repeated improvement area was observed for the selected period.");
  }

  return `
    <h2>Consolidated Audit Summary</h2>
    <p><b>Total Calls Checked:</b> ${totalCalls}</p>
    <p><b>Good Calls:</b> ${good}</p>
    <p><b>Bad Calls:</b> ${bad}</p>

    <h3>Key Strengths</h3>
    <ul>${strengths.slice(0, 5).map(s => `<li>${s}</li>`).join("")}</ul>

    <h3>Major Improvement Areas</h3>
    <ul>${improvementAreas.slice(0, 6).map(g => `<li>${g}</li>`).join("")}</ul>
  `;
}

function openDispute() {
  document.getElementById("disputePopup").style.display = "flex";
}

function closeDispute() {
  document.getElementById("disputePopup").style.display = "none";
}

async function submitDispute() {
  const agent = document.getElementById("agentSelect").value;
  const from = document.getElementById("fromDate").value;
  const to = document.getElementById("toDate").value;
  const slNo = document.getElementById("disputeSlNo").value.trim();
  const description = document.getElementById("disputeDesc").value.trim();
  const btn = document.getElementById("submitDisputeBtn");

  if (!slNo || !description) {
    alert("Please enter SL No and Description");
    return;
  }

  try {
    btn.disabled = true;
    setLoading("disputeSubmitStatus", "Dispute is getting submitted...");

    const data = await apiCall({
      action:"submitDispute",
      email:CURRENT_USER,
      agent:agent,
      from:from,
      to:to,
      slNo:slNo,
      description:description
    });

    if (!data.ok) {
      alert(data.error);
      return;
    }

    alert("Dispute submitted successfully");

    document.getElementById("disputeSlNo").value = "";
    document.getElementById("disputeDesc").value = "";

    closeDispute();
    await loadDisputes();

  } catch (err) {
    alert(err.message);
  } finally {
    btn.disabled = false;
    setLoading("disputeSubmitStatus", "");
  }
}

async function loadDisputes() {
  const agent = document.getElementById("agentSelect").value;

  const div = document.getElementById("disputes");
  div.style.display = "block";
  div.innerHTML = "<h2>Dispute Status</h2><p class='loading'>Fetching dispute status...</p>";

  const data = await apiCall({
    action:"getDisputes",
    email:CURRENT_USER,
    agent:agent
  });

  if (!data.ok) {
    div.innerHTML = `<h2>Dispute Status</h2><p>${data.error}</p>`;
    return;
  }

  const disputes = data.disputes || [];

  if (!disputes.length) {
    div.innerHTML = `<h2>Dispute Status - ${agent}</h2><p>No disputes raised by this agent.</p>`;
    return;
  }

  let html = `
    <h2>Dispute Status - ${agent}</h2>
    <p><b>Showing all disputes raised by this agent irrespective of selected date.</b></p>
    <table>
      <thead>
        <tr>
          <th>Raised Time</th>
          <th>Agent</th>
          <th>SL No</th>
          <th>Report From Date</th>
          <th>Report To Date</th>
          <th>Description</th>
          <th>Status</th>
          <th>QA Reply / Resolution</th>
        </tr>
      </thead>
      <tbody>
  `;

  disputes.forEach(d => {
    const resolved = (d.resolution || "").trim();

    html += `
      <tr class="${resolved ? 'good' : 'pending'}">
        <td>${d.timestamp || ""}</td>
        <td>${d.agent || ""}</td>
        <td>${d.slNo || ""}</td>
        <td>${d.from || ""}</td>
        <td>${d.to || ""}</td>
        <td>${d.description || ""}</td>
        <td>${resolved ? "Resolved" : "Pending"}</td>
        <td>${resolved || "QA reply pending"}</td>
      </tr>
    `;
  });

  html += `</tbody></table>`;
  div.innerHTML = html;
}
</script>
