<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Agent QA Report</title>

  <style>
    :root {
      --primary: #1976d2;
      --primary-dark: #1458a1;
      --accent: #4caf50;
      --border: #e1e5f2;
      --shadow-soft: 0 10px 25px rgba(15, 23, 42, 0.08);
      --font-main: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 24px;
      font-family: var(--font-main);
      background: radial-gradient(circle at top left, #e3f2fd 0, #f5f7fb 55%, #edf1ff 100%);
      color: #1f2933;
    }

    .shell {
      max-width: 1100px;
      margin: auto;
    }

    .topbar {
      background: linear-gradient(135deg, #1976d2, #673ab7);
      color: white;
      padding: 20px;
      border-radius: 18px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-soft);
    }

    .topbar h1 {
      margin: 0;
      font-size: 34px;
    }

    .topbar p {
      margin-top: 8px;
      opacity: 0.9;
    }

    .panel {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: var(--shadow-soft);
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-top: 10px;
      margin-bottom: 6px;
      font-weight: 600;
    }

    select,
    input[type="date"],
    input[type="text"],
    textarea {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #cbd2e1;
      font-size: 14px;
      font-family: var(--font-main);
    }

    .date-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    button {
      margin-top: 18px;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 999px;
      background: var(--primary);
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: var(--primary-dark);
    }

    button:disabled {
      background: #b7c5d8;
      cursor: not-allowed;
    }

    #status {
      margin-top: 12px;
      color: #666;
      font-size: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    th,
    td {
      border: 1px solid var(--border);
      padding: 10px;
      font-size: 13px;
      vertical-align: top;
    }

    th {
      background: #f3e5f5;
    }

    .good {
      background: #f1fff2;
    }

    .bad {
      background: #fff3f3;
    }

    .summary-box {
      background: #f1f8e9;
      padding: 15px;
      border-left: 5px solid var(--accent);
      border-radius: 10px;
      margin-top: 20px;
      white-space: pre-wrap;
    }

    .dispute-btn {
      width: auto;
      padding: 12px 18px;
      background: #d32f2f;
    }

    .dispute-btn:hover {
      background: #a91f1f;
    }

    #disputePopup {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .popup-box {
      background: white;
      width: 380px;
      max-width: 95%;
      padding: 20px;
      border-radius: 14px;
      box-shadow: var(--shadow-soft);
    }

    .popup-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 15px;
    }

    .popup-actions button {
      width: auto;
      padding: 10px 16px;
      margin-top: 0;
    }

    .cancel-btn {
      background: #ccc;
      color: black;
    }

    .cancel-btn:hover {
      background: #aaa;
    }

    @media(max-width: 700px) {
      .date-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<div class="shell">

  <div class="topbar">
    <h1>Agent QA Report</h1>
    <p>Filter any agent and generate QA insights in one click.</p>
  </div>

  <div class="panel">

    <label>Agent</label>
    <select id="agent">
      <option>Loading...</option>
    </select>

    <div class="date-row">
      <div>
        <label>From Date</label>
        <input type="date" id="from">
      </div>

      <div>
        <label>To Date</label>
        <input type="date" id="to">
      </div>
    </div>

    <button id="runBtn" onclick="runReport()">
      🔍 Generate Report
    </button>

    <div id="status">Waiting...</div>

  </div>

  <div class="panel" id="summary" style="display:none;"></div>

  <div class="panel" id="calls" style="display:none;"></div>

</div>

<div id="disputePopup">
  <div class="popup-box">

    <h3>Raise Dispute</h3>

    <label>SL No</label>
    <input type="text" id="disputeSlNo" placeholder="Enter SL No">

    <label>Description</label>
    <textarea id="disputeDesc" rows="4" placeholder="Enter dispute reason"></textarea>

    <div class="popup-actions">
      <button class="cancel-btn" onclick="closeDispute()">Cancel</button>
      <button onclick="submitDispute()">Submit</button>
    </div>

  </div>
</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzKuEq-k7VtLj-SkcIqriP55eJwtNkDfyfV6fsPcxj3OXVaraCynWuxCvk19nqNzlg/exec";

async function safeJson(res) {
  const text = await res.text();

  try {
    return JSON.parse(text);
  } catch (e) {
    throw new Error(text);
  }
}

async function init() {
  const agentSelect = document.getElementById("agent");
  const status = document.getElementById("status");

  status.textContent = "Loading agents...";

  try {
    const response = await fetch(`${SCRIPT_URL}?listAgents=1`);
    const data = await safeJson(response);

    if (!data.ok) {
      status.textContent = "Unable to load agents";
      return;
    }

    agentSelect.innerHTML = `<option value="">Select Agent</option>`;

    data.agents.forEach(agent => {
      const option = document.createElement("option");
      option.value = agent;
      option.textContent = agent;
      agentSelect.appendChild(option);
    });

    status.textContent = "Agents loaded successfully";

  } catch (err) {
    status.textContent = "Error: " + err.message;
  }
}

async function runReport() {
  const agent = document.getElementById("agent").value;
  const from = document.getElementById("from").value;
  const to = document.getElementById("to").value;
  const status = document.getElementById("status");
  const btn = document.getElementById("runBtn");

  if (!agent || !from || !to) {
    status.textContent = "Please select Agent, From Date and To Date";
    return;
  }

  status.textContent = "Generating report...";
  btn.disabled = true;

  try {
    const url = `${SCRIPT_URL}?agent=${encodeURIComponent(agent)}&from=${from}&to=${to}`;
    const response = await fetch(url);
    const data = await safeJson(response);

    if (!data.ok) {
      status.textContent = data.error || "No data found";
      btn.disabled = false;
      return;
    }

    renderSummary(data);
    renderCalls(data.calls || []);

    status.textContent = "Report generated successfully";

  } catch (err) {
    status.textContent = "Error: " + err.message;
  }

  btn.disabled = false;
}

function renderSummary(data) {
  const div = document.getElementById("summary");
  div.style.display = "block";

  div.innerHTML = `
    <h2>Performance Summary</h2>

    <table>
      <tr>
        <th>Agent</th>
        <td>${data.agent}</td>
      </tr>

      <tr>
        <th>Total Audits</th>
        <td>${data.totalAudits}</td>
      </tr>

      <tr>
        <th>Average Score</th>
        <td>${data.averageScore}%</td>
      </tr>

      <tr>
        <th>Period</th>
        <td>${data.period}</td>
      </tr>
    </table>
  `;
}

function renderCalls(calls) {
  const div = document.getElementById("calls");
  div.style.display = "block";

  if (!calls.length) {
    div.innerHTML = "<h2>No Calls Found</h2>";
    return;
  }

  let html = `
    <h2>Call Breakdown</h2>

    <table>
      <thead>
        <tr>
          <th>SL No</th>
          <th>Date</th>
          <th>Category</th>
          <th>Score</th>
          <th>Status</th>
          <th>Feedback</th>
        </tr>
      </thead>
      <tbody>
  `;

  let good = 0;
  let bad = 0;

  calls.forEach(call => {
    const score = Number(call.score || 0);
    const callStatus = score >= 90 ? "✅ Good" : "❌ Issue";

    if (score >= 90) {
      good++;
    } else {
      bad++;
    }

    html += `
      <tr class="${score >= 90 ? 'good' : 'bad'}">
        <td>${call.slNo || ""}</td>
        <td>${call.callDate || ""}</td>
        <td>${call.queryType || ""}</td>
        <td>${score}%</td>
        <td>${callStatus}</td>
        <td>${call.feedback || ""}</td>
      </tr>
    `;
  });

  html += `
      </tbody>
    </table>

    <div class="summary-box">
📈 OVERALL SUMMARY

✅ Good Calls: ${good}

❌ Calls with Issues: ${bad}

💡 SUGGESTION:
${bad > good
  ? "Focus on process adherence and communication quality."
  : "Good performance. Maintain the same quality."}
    </div>

    <div style="margin-top:20px; text-align:right;">
      <button class="dispute-btn" onclick="openDispute()">
        🚩 Raise Dispute
      </button>
    </div>
  `;

  div.innerHTML = html;
}

function openDispute() {
  document.getElementById("disputePopup").style.display = "flex";
}

function closeDispute() {
  document.getElementById("disputePopup").style.display = "none";
}

async function submitDispute() {
  const slNo = document.getElementById("disputeSlNo").value.trim();
  const description = document.getElementById("disputeDesc").value.trim();

  const agent = document.getElementById("agent").value;
  const from = document.getElementById("from").value;
  const to = document.getElementById("to").value;

  if (!slNo || !description) {
    alert("Please enter SL No and Description");
    return;
  }

  if (!agent || !from || !to) {
    alert("Please select Agent, From Date and To Date");
    return;
  }

  try {
    const params = new URLSearchParams();

    params.append("action", "dispute");
    params.append("agent", agent);
    params.append("slNo", slNo);
    params.append("description", description);
    params.append("from", from);
    params.append("to", to);

    const response = await fetch(SCRIPT_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/x-www-form-urlencoded;charset=utf-8"
      },
      body: params.toString()
    });

    const data = await safeJson(response);

    if (!data.ok) {
      alert("Failed to submit dispute: " + (data.error || "Unknown error"));
      return;
    }

    alert("Dispute submitted successfully");

    document.getElementById("disputeSlNo").value = "";
    document.getElementById("disputeDesc").value = "";

    closeDispute();

  } catch (err) {
    alert("Error: " + err.message);
  }
}

window.addEventListener("load", init);

</script>

</body>
</html>
